{% extends "base.html" %}
{% block title %}New Tournament{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{{ url_for('admin.tournaments') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
      <h4 class="fw-bold text-white mb-0"><i class="bi bi-plus-circle-fill text-warning me-2"></i>Create Tournament</h4>
    </div>

    <div class="card bg-dark border-secondary">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('admin.create_tournament') }}">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label text-light fw-semibold">Tournament Name *</label>
              <input type="text" name="name" class="form-control bg-secondary border-secondary text-white" placeholder="e.g. Phishing Awareness Challenge" required />
            </div>
            <div class="col-12">
              <label class="form-label text-light fw-semibold">Description</label>
              <textarea name="description" class="form-control bg-secondary border-secondary text-white" rows="3" placeholder="Describe the tournament goals and what participants will learn…"></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label text-light fw-semibold">Difficulty</label>
              <select name="difficulty" class="form-select bg-secondary border-secondary text-white" required>
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
                <option value="expert">Expert</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label text-light fw-semibold">Time per Challenge (seconds)</label>
              <input type="number" name="timer_seconds" class="form-control bg-secondary border-secondary text-white" value="300" min="30" max="3600" required />
              <div class="form-text text-muted">e.g. 300 = 5 minutes</div>
            </div>
            <div class="col-md-4">
              <label class="form-label text-light fw-semibold">Total Tournament Time (seconds)</label>
              <input type="number" name="total_timer_seconds" class="form-control bg-secondary border-secondary text-white" value="3600" min="60" max="86400" required />
              <div class="form-text text-muted">e.g. 3600 = 1 hour</div>
            </div>
            <div class="col-md-6">
              <label class="form-label text-light fw-semibold">Start Time (optional)</label>
              <input type="datetime-local" name="start_time" class="form-control bg-secondary border-secondary text-white" />
            </div>
            <div class="col-md-6">
              <label class="form-label text-light fw-semibold">End Time (optional)</label>
              <input type="datetime-local" name="end_time" class="form-control bg-secondary border-secondary text-white" />
            </div>
            <div class="col-md-6">
              <label class="form-label text-light fw-semibold">Max Participants</label>
              <input type="number" name="max_participants" class="form-control bg-secondary border-secondary text-white" value="100" min="1" />
            </div>
            <div class="col-md-6 d-flex align-items-end">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="is_active" id="is_active" />
                <label class="form-check-label text-light" for="is_active">Activate immediately</label>
              </div>
            </div>
          </div>

          <hr class="border-secondary my-4" />
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning fw-bold px-4">
              <i class="bi bi-check-lg me-1"></i>Create Tournament
            </button>
            <a href="{{ url_for('admin.tournaments') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
