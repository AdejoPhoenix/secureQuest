{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card card bg-dark border-secondary shadow-lg" style="width:100%;max-width:440px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-plus text-warning" style="font-size:3rem"></i>
        <h2 class="fw-bold mt-2 text-white">Create Account</h2>
        <p class="text-muted small">Join the security awareness challenge</p>
      </div>

      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-3">
          <label class="form-label text-light">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-secondary border-secondary"><i class="bi bi-person text-light"></i></span>
            <input type="text" name="username" class="form-control bg-secondary border-secondary text-white" placeholder="hacker42" required minlength="3" />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label text-light">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-secondary border-secondary"><i class="bi bi-envelope text-light"></i></span>
            <input type="email" name="email" class="form-control bg-secondary border-secondary text-white" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label text-light">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-secondary border-secondary"><i class="bi bi-lock text-light"></i></span>
            <input type="password" name="password" id="pwd" class="form-control bg-secondary border-secondary text-white" placeholder="min. 8 characters" required minlength="8" />
          </div>
          <div class="progress mt-2" style="height:4px">
            <div id="pwd-strength" class="progress-bar" style="width:0%"></div>
          </div>
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-bold">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </form>

      <div class="divider my-3 text-center text-muted small">
        <span class="bg-dark px-2">or</span>
      </div>

      <a href="{{ url_for('auth.google_login') }}" class="btn btn-outline-light w-100 mb-3">
        <svg class="me-2" width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </a>

      <p class="text-center text-muted small mb-0">
        Already have an account? <a href="{{ url_for('auth.login') }}" class="text-warning">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script>
document.getElementById('pwd').addEventListener('input', function() {
  const val = this.value;
  const bar = document.getElementById('pwd-strength');
  let score = 0;
  if (val.length >= 8) score += 25;
  if (/[A-Z]/.test(val)) score += 25;
  if (/[0-9]/.test(val)) score += 25;
  if (/[^A-Za-z0-9]/.test(val)) score += 25;
  bar.style.width = score + '%';
  bar.className = 'progress-bar ' + (score < 50 ? 'bg-danger' : score < 75 ? 'bg-warning' : 'bg-success');
});
</script>
{% endblock %}
