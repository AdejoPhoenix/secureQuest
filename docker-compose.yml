version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gameuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamepassword}
      POSTGRES_DB: ${POSTGRES_DB:-secgame}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gameuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "5001:5000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: python run.py

volumes:
  postgres_data:
